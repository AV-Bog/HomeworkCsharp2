<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MyNUnitWeb</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #upload-form { margin-bottom: 20px; }
        #history { margin-top: 20px; }
        .test-item { padding: 10px; border: 1px solid #ccc; margin: 5px 0; }
        .passed { background: #d4edda; }
        .failed { background: #f8d7da; }
        .ignored { background: #fff3cd; }
    </style>
</head>
<body>
<h1>MyNUnitWeb — Веб-интерфейс для юнит-тестирования</h1>

<div id="upload-form">
    <h2>Загрузка сборок</h2>
    <input type="file" id="fileInput" multiple accept=".dll,.exe">
    <button onclick="startTesting()">Начать тестирование</button>
    <div id="status"></div>
</div>

<div id="history">
    <h2>История запусков</h2>
    <div id="runs-list"></div>
</div>

<script>
    async function startTesting() {
        const files = document.getElementById('fileInput').files;
        if (files.length === 0) {
            alert("Выберите файлы!");
            return;
        }

        const formData = new FormData();
        for (let file of files) {
            formData.append('files', file);
        }

        document.getElementById('status').innerText = "Загрузка...";

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error("Ошибка загрузки");

            const data = await response.json();
            document.getElementById('status').innerText = `Тесты запущены. ID прогона: ${data.runId}`;
            loadHistory();
        } catch (error) {
            document.getElementById('status').innerText = "Ошибка: " + error.message;
        }
    }

    async function loadHistory() {
        const response = await fetch('/api/run');
        const runs = await response.json();

        const container = document.getElementById('runs-list');
        container.innerHTML = '';

        runs.forEach(run => {
            const div = document.createElement('div');
            div.innerHTML = `
                    <h3>Прогон ${run.id} (${new Date(run.timestamp).toLocaleString()})</h3>
                    <ul>
                        ${run.assemblies.map(asm => `
                            <li>
                                ${asm.path} — 
                                Успешно: ${asm.result.passedTests}, 
                                Ошибки: ${asm.result.failedTests}, 
                                Игнорировано: ${asm.result.ignoredTests}
                                <button onclick="showTests('${run.id}', '${asm.path}')">Показать тесты</button>
                            </li>
                        `).join('')}
                    </ul>
                `;
            container.appendChild(div);
        });
    }

    async function showTests(runId, assemblyPath) {
        const response = await fetch(`/api/run/${runId}`);
        const run = await response.json();

        const asm = run.assemblies.find(a => a.path === assemblyPath);
        if (!asm) return;

        const container = document.getElementById('runs-list');
        let html = `<h3>Тесты в сборке: ${assemblyPath}</h3><div>`;

        asm.result.classes.forEach(cls => {
            html += `<h4>${cls.className}</h4>`;
            cls.tests.forEach(test => {
                const statusClass = test.status === 'Passed' ? 'passed' :
                    test.status === 'Failed' ? 'failed' : 'ignored';
                html += `
                        <div class="test-item ${statusClass}">
                            <strong>${test.methodName}</strong> — 
                            Статус: ${test.status}, 
                            Время: ${test.durationMs} мс
                            ${test.message ? `<br>Сообщение: ${test.message}` : ''}
                        </div>
                    `;
            });
        });

        html += '</div>';
        container.innerHTML = html;
    }

    window.onload = loadHistory;
</script>
</body>
</html>
